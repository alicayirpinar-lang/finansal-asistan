# Genel tarama + tez üretimi — plan bölüm 11, workflow #1
# Hafta içi 06:00-21:00 UTC arası 15 dakikada bir (BIST + ABD seans saatlerini kapsar).
# Not: GitHub Actions cron gecikmeli çalışabilir; kritik hızlı yol ayrı sistemde (sonraki faz).
name: tarama

on:
  schedule:
    - cron: "*/15 6-21 * * 1-5"
  workflow_dispatch:      # elle tetikleme (test) + kritik hızlı yol (edge function)
    inputs:
      kaynak:
        description: "Tetik kaynağı (kritik = 7/24 nöbetçi)"
        required: false
        default: "elle"

# Bir koşu 15 dk'lık zaman aşımına yakın uzarsa bir sonraki tetiklemeyle üst üste
# binmesin (aksi halde iki koşu aynı anda Gemini'yi çağırıp dakika limitini
# ikiye katlayabilir) — yeni tetikleme öncekinin bitmesini bekler, iptal etmez.
concurrency:
  group: tarama
  cancel-in-progress: false

jobs:
  tarama:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash-lite
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DAILY_GEMINI_CAP: "200"
          TETIK_KAYNAK: ${{ inputs.kaynak || 'zamanlayici' }}
