# Genel tarama + tez üretimi — plan bölüm 11, workflow #1
# Hafta içi 06:00-21:00 UTC arası 15 dakikada bir (BIST + ABD seans saatlerini kapsar).
# Not: GitHub Actions'ın kendi `schedule:` tetikleyicisi sık (15 dk) cron'larda
# güvenilir çalışmıyor (23 Temmuz 2026 bulgusu, ayrıntı: proje notları) — kaldırıldı.
# Gerçek zamanlayıcı artık dışarıda: cron-job.org -> tarama-periyodik (Supabase
# Edge Function) -> bu workflow'u workflow_dispatch ile tetikliyor. Kritik hızlı
# yol da aynı şekilde (kritik-tarama Edge Function) workflow_dispatch kullanıyor.
name: tarama

on:
  workflow_dispatch:      # elle tetikleme (test) + periyodik/kritik dış tetikleyiciler
    inputs:
      kaynak:
        description: "Tetik kaynağı (periyodik = cron-job.org, kritik = 7/24 nöbetçi)"
        required: false
        default: "elle"

# Bir koşu 15 dk'lık zaman aşımına yakın uzarsa bir sonraki tetiklemeyle üst üste
# binmesin (aksi halde iki koşu aynı anda Gemini'yi çağırıp dakika limitini
# ikiye katlayabilir) — yeni tetikleme öncekinin bitmesini bekler, iptal etmez.
concurrency:
  group: tarama
  cancel-in-progress: false

jobs:
  tarama:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash-lite
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TETIK_KAYNAK: ${{ inputs.kaynak || 'zamanlayici' }}
