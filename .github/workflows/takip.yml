# Açık tez takibi — plan bölüm 11, workflow #2
# BIST kapanışı sonrası (15:10 UTC = 18:10 TRT) + ABD kapanışı sonrası (21:15 UTC).
# Bildirimler alerts tablosuyla teklendiği için günde iki koşu güvenli.
name: takip

on:
  schedule:
    - cron: "10 15 * * 1-5"
    - cron: "15 21 * * 1-5"
  workflow_dispatch: {}

jobs:
  takip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python track.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash-lite
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
